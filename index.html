<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla de Bienvenida - Sistema Financiero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes girarMoneda {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    @keyframes aparecer {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes desvanecer {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    .moneda {
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
      animation: girarMoneda 1.8s linear infinite;
      border: 3px solid #fff5b3;
    }

    .brillo {
      position: absolute;
      top: 10%;
      left: 10%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(255,255,255,0.4), transparent 70%);
      border-radius: 50%;
      mix-blend-mode: screen;
      filter: blur(4px);
    }

    .pantalla {
      animation: aparecer 1s ease-out;
    }

    .desaparecer {
      animation: desvanecer 1s ease-in forwards;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-indigo-900 to-black flex items-center justify-center h-screen text-white overflow-hidden">

  <!-- Pantalla de bienvenida -->
  <div id="intro" class="pantalla flex flex-col items-center justify-center text-center">
    <div class="relative moneda mb-6">
      <div class="brillo"></div>
    </div>
    <h1 class="text-3xl md:text-4xl font-extrabold text-yellow-400 mb-2 tracking-wide">
      GESTIÓN FINANCIERA
    </h1>
    <p class="text-gray-300 text-sm md:text-base mb-6">Cargando sistema...</p>

    <div class="w-52 bg-gray-700 rounded-full h-2 overflow-hidden">
      <div id="barra" class="bg-yellow-400 h-2 rounded-full transition-all duration-700" style="width: 0%;"></div>
    </div>
  </div>

  <!-- Redirección automática -->
  <script>
    const barra = document.getElementById("barra");
    const intro = document.getElementById("intro");

    let progreso = 0;
    const intervalo = setInterval(() => {
      progreso += 10;
      barra.style.width = progreso + "%";
      if (progreso >= 100) {
        clearInterval(intervalo);
        intro.classList.add("desaparecer");
        setTimeout(() => {
          window.location.href = "index2.html"; // 🔹 Cambia aquí el destino
        }, 1000);
      }
    }, 250);
  </script>
</body>
</html>
