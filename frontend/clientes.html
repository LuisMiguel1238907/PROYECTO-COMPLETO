<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listado de Clientes - Sistema de Préstamos</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#f3f4f6; font-family: 'Poppins', sans-serif; }

    .sidebar {
      width: 250px; background:#111827; color:white; height:100vh;
      position:fixed; top:0; left:0; display:flex; flex-direction:column; padding-top:1rem;
    }
    .sidebar h2 { text-align:center; font-size:1.25rem; font-weight:600; margin-bottom:1rem; border-bottom:1px solid #374151; padding-bottom:0.5rem; }
    .sidebar a { color:#d1d5db; padding:12px 20px; text-decoration:none; display:block; font-weight:500; transition:0.2s; }
    .sidebar a:hover { background:#374151; color:white; }
    .sidebar a.active { background:#2563eb; color:white; font-weight:600; }

    .btn-nueva { background:#16a34a; color:white; text-align:center; margin:1rem 20px; padding:10px; border-radius:8px; font-weight:600; cursor:pointer; }
    .btn-nueva:hover { background:#15803d; }

    .main { margin-left:250px; padding:2rem; }
    .card { background:white; border-radius:12px; padding:1.5rem; box-shadow:0 3px 10px rgba(0,0,0,0.08); }

    table { width:100%; border-collapse:collapse; margin-top:1rem; }
    th { background:#f9fafb; color:#374151; font-size:0.75rem; text-transform:uppercase; font-weight:600; padding:12px 8px; border-bottom:2px solid #e5e7eb; }
    td { padding:10px 8px; border-bottom:1px solid #f3f4f6; color:#111827; font-size:0.9rem; }
    tr:hover { background:#f9fafb; }

    .badge { padding:3px 8px; border-radius:8px; color:white; font-size:0.75rem; font-weight:500; }
    .activo{ background:#10b981; }
    .inactivo{ background:#ef4444; }

    .btn-editar{ color:#2563eb; cursor:pointer; font-weight:600; }
    .btn-editar:hover{ text-decoration:underline; }

    .btn-eliminar{ color:#dc2626; cursor:pointer; font-weight:600; }
    .btn-eliminar:hover{ text-decoration:underline; }

    /* Modal */
    .modal{ display:none; position:fixed; z-index:50; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    .modal-content{ background:white; padding:2rem; border-radius:10px; width:400px; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
    .modal-content input,.modal-content select{ width:100%; padding:8px; margin-bottom:10px; border:1px solid #d1d5db; border-radius:6px; }

    .btn-guardar{ background:#16a34a; color:white; padding:8px 14px; border-radius:6px; font-weight:600; cursor:pointer; }
    .btn-guardar:hover{ background:#15803d; }
    .btn-cerrar{ background:#dc2626; color:white; padding:8px 14px; border-radius:6px; font-weight:600; cursor:pointer; }
    .btn-cerrar:hover{ background:#b91c1c; }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Sistema de Préstamos</h2>
    <a href="index3.html">Panel principal</a>
    <a href="prestamos.html">Préstamos</a>
    <a href="clientes.html" class="active">Clientes</a>
    <a href="historialpagos.html">Historial</a>
    <a href="reportes.html">Reportes</a>
    <div class="btn-nueva" onclick="window.location.href='index3.html'">Regresar al inicio</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">👥 Listado de Clientes</h1>
      <button class="btn-crear bg-blue-600 text-white px-4 py-2 rounded-md" id="abrirModal">➕ Nuevo Cliente</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Correo</th>
            <th>Dirección</th><th>Monto</th><th>Fecha</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaClientes"></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modalCliente">
    <div class="modal-content">
      <h2>Nuevo Cliente</h2>
      <input type="text" id="nombre" placeholder="Nombre completo" required>
      <input type="text" id="cedula" placeholder="Cédula" required>
      <input type="text" id="telefono" placeholder="Teléfono">
      <input type="email" id="correo" placeholder="Correo electrónico">
      <input type="text" id="direccion" placeholder="Dirección">
      <input type="number" id="monto" placeholder="Monto del préstamo" required>
      <input type="date" id="fecha" required>
      <select id="estado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>

      <div class="flex justify-end gap-2 mt-4">
        <button class="btn-cerrar" id="cerrarModal">Cancelar</button>
        <button class="btn-guardar" id="guardarCliente">Guardar</button>
      </div>
    </div>
  </div>

<script>
const API_URL = "http://127.0.0.1:8000";
const token = localStorage.getItem("token");

if (!token) {
  alert("Debes iniciar sesión");
  window.location.href = "index2.html";
}

const tabla = document.getElementById("tablaClientes");
const modal = document.getElementById("modalCliente");
const abrirModal = document.getElementById("abrirModal");
const cerrarModal = document.getElementById("cerrarModal");
const guardarCliente = document.getElementById("guardarCliente");

abrirModal.onclick = () => modal.style.display = "flex";
cerrarModal.onclick = () => modal.style.display = "none";

/* ✅ CARGAR CLIENTES DESDE BACKEND */
async function cargarClientes() {
  tabla.innerHTML = "";

  try {
    const resp = await fetch(`${API_URL}/clientes/`, {
      headers: { "Authorization": "Bearer " + token }
    });

    if (resp.status === 401) {
      alert("Sesión expirada. Inicia sesión");
      localStorage.removeItem("token");
      window.location.href = "index2.html";
      return;
    }

    const clientes = await resp.json();

    clientes.forEach(cliente => {
  const fila = document.createElement("tr");
  fila.innerHTML = `
    <td>${cliente.nombre}</td>
    <td>${cliente.cedula}</td>
    <td>${cliente.telefono || "-"}</td>
    <td>${cliente.correo || "-"}</td>
    <td>${cliente.direccion || "-"}</td>
    <td class="text-blue-600 font-bold">$${cliente.monto}</td>
    <td>${cliente.fecha}</td>
    <td>
      <span class="badge ${cliente.estado === "Activo" ? "activo" : "inactivo"}">
        ${cliente.estado}
      </span>
    </td>
    <td>
      <span class="btn-editar" onclick="editarCliente(${cliente.id})">Editar</span> |
      <span class="btn-eliminar" onclick="eliminarCliente(${cliente.id})">Eliminar</span>
    </td>`;
  tabla.appendChild(fila);
});

  } catch (e) {
    console.log(e);
    alert("Error conectando con el servidor");
  }
}

/* ✅ CREAR CLIENTE (POST BACKEND) */
guardarCliente.onclick = async () => {
  const nombre = document.getElementById("nombre").value.trim();
  const cedula = document.getElementById("cedula").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const correo = document.getElementById("correo").value.trim();
  const direccion = document.getElementById("direccion").value.trim();
  const monto = parseFloat(document.getElementById("monto").value);
  const fecha = document.getElementById("fecha").value;
  const estado = document.getElementById("estado").value;

  if (!nombre || !cedula || !monto || !fecha) {
    alert("Completa los campos obligatorios");
    return;
  }

  // Datos en objeto para enviar
  const data = {
    nombre, cedula, telefono, correo, direccion,
    monto, fecha, estado
  };

  try {
    let resp;

    // ✅ SI EXISTE window.clienteEditando → EDITAR
    if (window.clienteEditando) {
      resp = await fetch(`${API_URL}/clientes/${window.clienteEditando}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
      });

      if (!resp.ok) {
        alert("Error actualizando cliente");
        return;
      }

      // reset botón y variable
      window.clienteEditando = null;
      guardarCliente.textContent = "Guardar";

    } else {
      // ✅ si NO existe → CREAR
      resp = await fetch(`${API_URL}/clientes/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
      });

      if (!resp.ok) {
        const err = await resp.json();
        alert(err.detail || "Error guardando el cliente");
        return;
      }
    }

    // ✅ cerrar modal y limpiar
    modal.style.display = "none";
    document.querySelectorAll("#modalCliente input").forEach(i => i.value = "");

    cargarClientes();

  } catch (e) {
    alert("Error conectando con el servidor");
  }
};



/* ✅ ELIMINAR CLIENTE */
async function eliminarCliente(id) {
  if (!confirm("¿Eliminar cliente?")) return;

  try {
    const resp = await fetch(`${API_URL}/clientes/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization":"Bearer " + token
      }
    });
    cargarClientes();
  } catch (e) {
    alert("Error eliminando cliente");
  }
}

document.addEventListener("DOMContentLoaded", cargarClientes);





async function editarCliente(id) {
  try {
    const resp = await fetch(`${API_URL}/clientes/${id}`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!resp.ok) {
      alert("Error cargando cliente");
      return;
    }

    const cliente = await resp.json();

    // Llenar campos del modal
    document.getElementById("nombre").value = cliente.nombre;
    document.getElementById("cedula").value = cliente.cedula;
    document.getElementById("telefono").value = cliente.telefono;
    document.getElementById("correo").value = cliente.correo;
    document.getElementById("direccion").value = cliente.direccion;
    document.getElementById("monto").value = cliente.monto;
    document.getElementById("fecha").value = cliente.fecha;
    document.getElementById("estado").value = cliente.estado;

    // Guardamos ID en variable global
    window.clienteEditando = id;

    // Abrir modal
    modal.style.display = "flex";
    document.getElementById("guardarCliente").textContent = "Actualizar Cliente";

  } catch (err) {
    alert("Error conectando con el servidor");
  }
}

</script>

  



</body>
</html>
