<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c14;
            --card: #0d1524;
            --border: rgba(99, 179, 237, 0.12);
            --blue: #3b82f6;
            --blue-light: #60a5fa;
            --blue-glow: rgba(59, 130, 246, 0.35);
            --text: #e2e8f0;
            --muted: #64748b;
            --input-bg: rgba(15, 23, 42, 0.8);
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* Fondo animado */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 20%, rgba(37, 99, 235, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Grid de puntos */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(99, 179, 237, 0.07) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2.25rem;
            box-shadow:
                0 0 0 1px rgba(59, 130, 246, 0.06),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(37, 99, 235, 0.07);
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.08));
            border: 1px solid rgba(59, 130, 246, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-wrap svg {
            width: 30px;
            height: 30px;
            color: var(--blue-light);
        }

        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.4s ease;
        }

        .step-dot.active {
            background: var(--blue);
            box-shadow: 0 0 10px var(--blue-glow);
            width: 24px;
            border-radius: 4px;
        }

        .step-dot.done {
            background: var(--success);
        }

        h1 {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--text);
            text-align: center;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .field {
            position: relative;
            margin-bottom: 1rem;
        }

        .field svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .field input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(100, 116, 139, 0.25);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            padding: 0.8rem 0.9rem 0.8rem 2.65rem;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .field input::placeholder {
            color: var(--muted);
        }

        .field input:focus {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .field input:focus + svg,
        .field input:focus ~ svg {
            color: var(--blue-light);
        }

        .field .icon-right {
            left: auto;
            right: 14px;
            cursor: pointer;
            pointer-events: auto;
        }

        .field input.has-right {
            padding-right: 2.65rem;
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            margin-top: 0.5rem;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(37, 99, 235, 0.5);
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(0);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            margin-top: 1.5rem;
            color: var(--muted);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--blue-light);
        }

        .email-badge {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--blue-light);
            word-break: break-all;
        }

        .email-badge svg {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
        }

        .step-panel {
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .step-panel.hidden {
            display: none;
        }

        .step-panel.entering {
            animation: slideIn 0.35s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: 0.5rem;
        }

        .strength-bar span {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(100, 116, 139, 0.2);
            transition: background 0.3s;
        }

        .strength-label {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.3rem;
            text-align: right;
            transition: color 0.3s;
        }

        .error-msg {
            font-size: 0.78rem;
            color: #f87171;
            margin-top: 0.4rem;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        /* TOASTS */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            min-width: 280px;
            max-width: 380px;
            padding: 14px 16px;
            border-radius: 16px;
            color: white;
            font-weight: 500;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideInToast 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error   { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-info    { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        .toast-icon {
            font-size: 1.2rem;
            line-height: 1.2;
        }

        .toast-content {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.35;
        }

        .toast-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.85;
        }

        .toast-close:hover {
            opacity: 1;
        }

        .toast-progress {
            position: absolute;
            left: 0;
            bottom: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.45);
            animation: toastProgress linear forwards;
        }

        @keyframes slideInToast {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes toastProgress {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">

        <div class="icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z" clip-rule="evenodd"/>
            </svg>
        </div>

        <div class="steps">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-dot" id="dot2"></div>
        </div>

        <!-- PASO 1 -->
        <div class="step-panel" id="step1">
            <h1>Restablece tu<br>Contraseña</h1>
            <p class="subtitle">Ingresa tu correo electrónico y te enviaremos un enlace para recuperar el acceso.</p>

            <div class="field">
                <input type="email" id="email-input" placeholder="correo@ejemplo.com" autocomplete="email">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
                </svg>
            </div>

            <p class="error-msg" id="email-error">Por favor ingresa un correo válido.</p>

            <button class="btn" onclick="goToStep2()">CONTINUAR →</button>

            <a href="index2.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                </svg>
                Volver al inicio de sesión
            </a>
        </div>

        <!-- PASO 2 -->
        <div class="step-panel hidden" id="step2">
            <h1>Nueva<br>Contraseña</h1>
            <p class="subtitle">Crea una contraseña segura para la cuenta:</p>

            <div class="email-badge">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
                </svg>
                <span id="email-display"></span>
            </div>

            <form onsubmit="return validatePasswords()">

                <div class="field" style="margin-bottom: 0.4rem;">
                    <input
                        type="password"
                        id="new_password"
                        name="new_password"
                        placeholder="Nueva contraseña"
                        class="has-right"
                        oninput="checkStrength(this.value)"
                        required
                    >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd"/>
                    </svg>
                    <svg class="icon-right" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" onclick="togglePass('new_password', this)">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                    </svg>
                </div>

                <div class="strength-bar">
                    <span id="bar1"></span>
                    <span id="bar2"></span>
                    <span id="bar3"></span>
                    <span id="bar4"></span>
                </div>
                <p class="strength-label" id="strength-label"></p>

                <div class="field" style="margin-top: 1rem;">
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Confirmar contraseña"
                        class="has-right"
                        required
                    >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd"/>
                    </svg>
                    <svg class="icon-right" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" onclick="togglePass('confirm_password', this)">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                    </svg>
                </div>

                <p class="error-msg" id="pass-error">Las contraseñas no coinciden.</p>

                <input type="hidden" name="email" id="email-hidden">

                <button type="submit" class="btn">RESTABLECER Y ENTRAR</button>
            </form>

            <button class="back-link" onclick="goToStep1()" style="background:none;border:none;cursor:pointer;font-family:inherit;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                </svg>
                Cambiar correo
            </button>
        </div>

    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showToast(message, type = "success", duration = 3000) {
        const container = document.getElementById("toastContainer");
        if (!container) return;

        const icons = {
            success: "✅",
            error: "❌",
            warning: "⚠️",
            info: "ℹ️"
        };

        const toast = document.createElement("div");
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `
            <div class="toast-icon">${icons[type] || "ℹ️"}</div>
            <div class="toast-content">${message}</div>
            <button class="toast-close">&times;</button>
            <div class="toast-progress" style="animation-duration:${duration}ms;"></div>
        `;

        container.appendChild(toast);

        const removeToast = () => {
            toast.style.opacity = "0";
            toast.style.transform = "translateX(30px)";
            toast.style.transition = "all 0.2s ease";
            setTimeout(() => toast.remove(), 200);
        };

        toast.querySelector(".toast-close").addEventListener("click", removeToast);
        setTimeout(removeToast, duration);
    }

    function goToStep2() {
        const email = document.getElementById('email-input').value.trim();
        const err = document.getElementById('email-error');

        if (!isValidEmail(email)) {
            err.classList.add('visible');
            document.getElementById('email-input').focus();
            return;
        }

        err.classList.remove('visible');

        document.getElementById('email-display').textContent = email;
        document.getElementById('email-hidden').value = email;

        document.getElementById('step1').classList.add('hidden');
        const s2 = document.getElementById('step2');
        s2.classList.remove('hidden');
        s2.classList.add('entering');
        setTimeout(() => s2.classList.remove('entering'), 350);

        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot1').classList.add('done');
        document.getElementById('dot2').classList.add('active');
    }

    function goToStep1() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('dot1').classList.add('active');
        document.getElementById('dot1').classList.remove('done');
        document.getElementById('dot2').classList.remove('active');
    }

    function validatePasswords() {
        const p1 = document.getElementById('new_password').value;
        const p2 = document.getElementById('confirm_password').value;
        const err = document.getElementById('pass-error');

        if (!p1 || !p2) {
            err.textContent = 'Por favor completa ambos campos.';
            err.classList.add('visible');
            return false;
        }

        if (p1 !== p2) {
            err.textContent = 'Las contraseñas no coinciden.';
            err.classList.add('visible');
            return false;
        }

        err.classList.remove('visible');

        showToast('Su contraseña ha sido cambiada con éxito', 'success', 1800);

        setTimeout(() => {
            window.location.href = 'index2.html';
        }, 1600);

        return false;
    }

    function togglePass(id, icon) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        icon.style.color = isText ? '' : 'var(--blue-light)';
    }

    function checkStrength(val) {
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
        const labels = ['', 'Débil', 'Regular', 'Buena', 'Fuerte'];
        const labelColors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#10b981'];

        for (let i = 1; i <= 4; i++) {
            const bar = document.getElementById('bar' + i);
            bar.style.background = i <= score ? colors[score] : 'rgba(100, 116, 139, 0.2)';
        }

        const label = document.getElementById('strength-label');
        if (val.length === 0) {
            label.textContent = '';
            return;
        }

        label.textContent = labels[score] || 'Muy débil';
        label.style.color = labelColors[score] || '#ef4444';
    }

    document.getElementById('email-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            goToStep2();
        }
    });
</script>

</body>
</html>
