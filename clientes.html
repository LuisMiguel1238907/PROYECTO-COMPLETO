<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes - Sistema de Préstamos</title>

  <!-- Redirección de respaldo si JS falla -->
  <meta http-equiv="refresh" content="0;url=index3.html#clientes" />
  <script src="https://cdn.tailwindcss.com"></script>

  

  <style>
    html, body {
      margin: 0;
      background: #f3f4f6;
      font-family: "Poppins", sans-serif;
    }

    .sidebar {
      width: 16rem;
      background: linear-gradient(180deg, #111827 0%, #1f2937 100%);
      transition: all 0.3s ease;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      border-bottom: 1px solid #374151;
      padding-bottom: 0.5rem;
    }

    .sidebar a {
      color: #d1d5db;
      padding: 12px 20px;
      text-decoration: none;
      display: block;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .sidebar a:hover {
      background: #374151;
      color: white;
    }

    .sidebar a.active {
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    .btn-nueva {
      background: #16a34a;
      color: white;
      text-align: center;
      margin: 1rem 20px;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-nueva:hover {
      background: #15803d;
    }

    .main {
      margin-left: 16rem;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      padding: 12px 8px;
      border-bottom: 2px solid #e5e7eb;
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #f3f4f6;
      color: #111827;
      font-size: 0.9rem;
    }

    tr:hover {
      background: #f9fafb;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 8px;
      color: white;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .activo {
      background: #10b981;
    }

    .inactivo {
      background: #ef4444;
    }

    .btn-editar {
      color: #2563eb;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-editar:hover {
      text-decoration: underline;
    }

    .btn-eliminar {
      color: #dc2626;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-eliminar:hover {
      text-decoration: underline;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 50;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }

    .btn-guardar {
      background: #16a34a;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-guardar:hover {
      background: #15803d;
    }

    .btn-cerrar {
      background: #dc2626;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-cerrar:hover {
      background: #b91c1c;
    }
     /* =========================
       TEMAS GLOBALES
    ========================= */

    /* TEMA CLARO */
    body.theme-claro {
      background: #f3f4f6;
    }

    /* TEMA OSCURO */
    body.theme-oscuro {
      background: #0f172a !important;
    }

    body.theme-oscuro main h1,
    body.theme-oscuro main h2,
    body.theme-oscuro main h3,
    body.theme-oscuro main p,
    body.theme-oscuro main span,
    body.theme-oscuro main strong,
    body.theme-oscuro main label,
    body.theme-oscuro main th,
    body.theme-oscuro main td {
      color: #f9fafb !important;
    }

    body.theme-oscuro .bg-white,
    body.theme-oscuro .card,
    body.theme-oscuro .modal-content {
      background: #111827 !important;
      color: #f9fafb !important;
    }

    body.theme-oscuro th {
      background: #1f2937 !important;
      border-bottom: 2px solid #374151 !important;
    }

    body.theme-oscuro td {
      border-bottom: 1px solid #1f2937 !important;
    }

    body.theme-oscuro tr:hover {
      background: #1f2937 !important;
    }

    body.theme-oscuro .modal-content input,
    body.theme-oscuro .modal-content select {
      background: #1f2937 !important;
      color: #f9fafb !important;
      border-color: #374151 !important;
    }

    body.theme-oscuro .modal-content input::placeholder {
      color: #9ca3af !important;
    }

    body.theme-oscuro .sidebar {
      background: linear-gradient(180deg, #020617 0%, #111827 100%) !important;
    }

    /* TEMA AZUL */
    body.theme-azul {
      background: #dbeafe !important;
    }

    body.theme-azul .bg-white,
    body.theme-azul .card,
    body.theme-azul .modal-content {
      background: #eff6ff !important;
    }

    body.theme-azul .sidebar {
      background: linear-gradient(180deg, #1d4ed8 0%, #1e3a8a 100%) !important;
    }

  </style>
</head>

<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Sistema de Préstamos</h2>
    <a href="index3.html">Panel principal</a>
    <a href="prestamos.html">Préstamos</a>
    <a href="clientes.html" class="active">Clientes</a>
    <a href="historialpagos.html">Historial</a>
    <a href="reportes.html">Reportes</a>
    <div class="btn-nueva" onclick="window.location.href='index3.html'">Regresar al inicio</div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">👥 Listado de Clientes</h1>
      <button class="btn-crear bg-blue-600 text-white px-4 py-2 rounded-md" id="abrirModal">➕ Nuevo Cliente</button>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Correo</th>
            <th>Dirección</th><th>Monto</th><th>Fecha</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaClientes"></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modalCliente">
    <div class="modal-content">
      <h2>Nuevo Cliente</h2>
      <input type="text" id="nombre" placeholder="Nombre completo" required>
      <input type="text" id="cedula" placeholder="Cédula" required>
      <input type="text" id="telefono" placeholder="Teléfono">
      <input type="email" id="correo" placeholder="Correo electrónico">
      <input type="text" id="direccion" placeholder="Dirección">
      <input type="text" id="monto" class="form-control" placeholder="Monto del préstamo" required inputmode="numeric">
      <input type="date" id="fecha" required>
      <select id="estado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>

      <div class="flex justify-end gap-2 mt-4">
        <button class="btn-cerrar" id="cerrarModal">Cancelar</button>
        <button class="btn-guardar" id="guardarCliente">Guardar</button>
      </div>
    </div>
  </div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
function showToast(message, type = "success", duration = 3000) {
    const container = document.getElementById("toastContainer");

    const icons = {
      success: "✅",
      error: "❌",
      warning: "⚠️",
      info: "ℹ️"
    };

    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
      <div class="toast-icon">${icons[type] || "ℹ️"}</div>
      <div class="toast-content">${message}</div>
      <button class="toast-close">&times;</button>
      <div class="toast-progress" style="animation-duration:${duration}ms;"></div>
    `;

    container.appendChild(toast);

    const removeToast = () => {
      toast.style.opacity = "0";
      toast.style.transform = "translateX(30px)";
      toast.style.transition = "all 0.2s ease";
      setTimeout(() => toast.remove(), 200);
    };

    toast.querySelector(".toast-close").addEventListener("click", removeToast);
    setTimeout(removeToast, duration);
  }

  const API_URL = "http://127.0.0.1:8000";
  const token = localStorage.getItem("token");
 
  if (!token) {
    showToast("Sesión expirada. Inicia sesión nuevamente.", "warning", 1800);
    setTimeout(() => {
      window.location.href = "index2.html";
    }, 1200);
  }

  async function loadUser() {
    try {
      const resp = await fetch(`${API_URL}/auth/me`, {
        headers: { Authorization: "Bearer " + token },
      });

      if (!resp.ok) return;

      const data = await resp.json();
      document.getElementById("admin-name").textContent = data.nombre;
      document.getElementById("admin-email").textContent = data.email;
      document.getElementById("usuarioNombre").textContent = data.nombre;

      document.getElementById("edit-name").value = data.nombre;
      document.getElementById("edit-email").value = data.email;
    } catch (e) {
      console.log("Error:", e);
    }
  }

  async function saveProfile() {
    const nombre = document.getElementById("edit-name").value.trim();
    const email = document.getElementById("edit-email").value.trim();
    const password = document.getElementById("edit-password").value;

    try {
      const resp = await fetch(`${API_URL}/auth/update`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + token,
        },
        body: JSON.stringify({ nombre, email, password }),
      });

      if (resp.ok) {
        showToast("Perfil actualizado", "success");
        closeEditProfileModal();
        document.getElementById("edit-password").value = "";
        loadUser();
      } else {
        showToast("Error al actualizar", "error");
      }
    } catch (e) {
      showToast("Error conectando con el servidor", "error");
    }
  }

  function openEditProfileModal() {
    const modal = document.getElementById("editProfileModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  }

  function closeEditProfileModal() {
    const modal = document.getElementById("editProfileModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }

  function saveSecuritySettings() {
    const security = {
      twoFactor: document.getElementById("two-factor").checked,
      rememberSession: document.getElementById("remember-session").checked,
      autoLock: document.getElementById("auto-lock").checked,
    };

    localStorage.setItem("securitySettings", JSON.stringify(security));
    showToast("Configuración de seguridad guardada", "success");
  }

  function saveNotificationSettings() {
    const notifications = {
      pagosVencidos: document.getElementById("noti-pagos-vencidos").checked,
      prestamosAprobados: document.getElementById("noti-prestamos-aprobados").checked,
      resumenes: document.getElementById("noti-resumenes").checked,
      seguridad: document.getElementById("noti-seguridad").checked,
    };

    localStorage.setItem("notificationSettings", JSON.stringify(notifications));
    showToast("Preferencias de notificación guardadas", "success");
  }

  function loadLocalSettings() {
    const security = JSON.parse(localStorage.getItem("securitySettings") || "{}");
    const notifications = JSON.parse(localStorage.getItem("notificationSettings") || "{}");

    if (typeof security.twoFactor === "boolean") {
      document.getElementById("two-factor").checked = security.twoFactor;
    }
    if (typeof security.rememberSession === "boolean") {
      document.getElementById("remember-session").checked = security.rememberSession;
    }
    if (typeof security.autoLock === "boolean") {
      document.getElementById("auto-lock").checked = security.autoLock;
    }

    if (typeof notifications.pagosVencidos === "boolean") {
      document.getElementById("noti-pagos-vencidos").checked = notifications.pagosVencidos;
    }
    if (typeof notifications.prestamosAprobados === "boolean") {
      document.getElementById("noti-prestamos-aprobados").checked = notifications.prestamosAprobados;
    }
    if (typeof notifications.resumenes === "boolean") {
      document.getElementById("noti-resumenes").checked = notifications.resumenes;
    }
    if (typeof notifications.seguridad === "boolean") {
      document.getElementById("noti-seguridad").checked = notifications.seguridad;
    }
  }

  function applyTheme(theme) {
    const root = document.documentElement;

    root.classList.remove("theme-claro", "theme-oscuro", "theme-azul");
    root.classList.add(`theme-${theme}`);
    localStorage.setItem("appTheme", theme);

    if (theme === "oscuro") {
      root.style.background = "#0f172a";
    } else if (theme === "azul") {
      root.style.background = "#dbeafe";
    } else {
      root.style.background = "#f3f4f6";
    }

    updateThemeButtons(theme);
  }

  function updateThemeButtons(activeTheme) {
    document.querySelectorAll(".theme-btn").forEach(btn => {
      btn.classList.remove("active-theme");
      if (btn.dataset.theme === activeTheme) {
        btn.classList.add("active-theme");
      }
    });
  }

  function initTheme() {
    const savedTheme = localStorage.getItem("appTheme") || "claro";
    applyTheme(savedTheme);

    document.querySelectorAll(".theme-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        applyTheme(btn.dataset.theme);
      });
    });
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "index2.html";
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadUser();
    loadLocalSettings();
    initTheme();
    const savedPic = localStorage.getItem('profilePic');

  });
  document.addEventListener("DOMContentLoaded", () => {
  const montoInput = document.getElementById("monto");
  montoInput.addEventListener("input", function () {
  // Quitar todo lo que no sea número
  let raw = this.value.replace(/\D/g, "");
  // Formatear con puntos cada 3 dígitos manualmente
  if (raw) {
    this.value = raw.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  } else {
    this.value = "";
  }
});
});
</script>

</body>
</html>
